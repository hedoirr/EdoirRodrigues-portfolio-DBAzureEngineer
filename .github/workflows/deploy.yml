name: Azure Data Platform CI/CD

on:
  push:
    branches:
      - main

jobs:

  # 🔹 1. Deploy Infra (Azure)
  deploy-infra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group rg-data-platform-ed \
            --template-file infrastructure/bicep/main.bicep

  # 🔹 2. Deploy Databricks Notebooks
  deploy-databricks:
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli

      - name: Configure Databricks
        run: |
          databricks configure --token <<EOF
          ${{ https://adb-7405613042262241.1.azuredatabricks.net}}
          ${{ dapiaa0f7f716d1f797fb566fbc5446ba016-2 }}
          EOF

      - name: Deploy Notebooks
        run: |
          databricks workspace import_dir notebooks /Workspace/Users/contatoedoir@gmail.com/read-azure-logs --overwrite 

  # 🔹 3. (Opcional) Deploy ADF
  deploy-adf:
    runs-on: ubuntu-latest
    needs: deploy-infra

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ADF Pipeline
        run: |
          az deployment group create \
            --resource-group rg-data-platform-ed \
            --template-file adf/pipelines/pl_ingest_azure_logs.json
